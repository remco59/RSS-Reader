services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations
    ports:
      - "8090:8090"
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - -c
      - >-
        /usr/local/bin/pocketbase superuser upsert $$PB_ADMIN_EMAIL $$PB_ADMIN_PASSWORD
        --dir=/pb/pb_data 2>/dev/null || true;
        exec /usr/local/bin/pocketbase serve --http=0.0.0.0:8090 --dir=/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  nuxt:
    build:
      context: ./nuxt-app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      PUBLIC_POCKETBASE_URL: ${PUBLIC_POCKETBASE_URL:-http://localhost:8090}
      NUXT_POCKETBASE_URL: http://pocketbase:8090
      NUXT_PUBLIC_POCKETBASE_URL: ${PUBLIC_POCKETBASE_URL:-http://localhost:8090}
    env_file:
      - .env
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app

  fetcher:
    build:
      context: ./fetcher
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POCKETBASE_URL: http://pocketbase:8090
    env_file:
      - .env
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  pb_data:

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Facebook – log in or sign up</title>
  <meta property="og:title" content="Facebook" />
</head>
<body>
  <h2>Log in to Facebook</h2>
  <p>Log in to see photos and updates from friends and Pages you follow.</p>
  <form method="post" action="https://m.facebook.com/login/device-based/regular/login/?refsrc=deprecated">
    <input type="email" name="m_login_email" id="m_login_email" placeholder="Email or phone number" />
    <input type="password" name="m_login_password" placeholder="Password" />
    <button type="submit" id="loginbutton" name="login">Log in</button>
  </form>
  <a href="/r/lgn?next=...">Create new account</a>
</body>
</html>

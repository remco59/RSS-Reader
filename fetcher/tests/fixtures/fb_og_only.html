<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SomeOrg - Facebook</title>
  <!-- Only Open Graph tags — no story containers or JSON-LD.
       Represents a page where Facebook served minimal SSR content. -->
  <meta property="og:title" content="SomeOrg" />
  <meta property="og:description" content="SomeOrg is a nonprofit focused on environmental conservation." />
  <meta property="og:image" content="https://example.com/someorg.jpg" />
  <meta property="og:url" content="https://www.facebook.com/SomeOrg" />
  <meta property="og:type" content="website" />
</head>
<body>
  <div id="root">
    <!-- No parseable story containers; only the meta tags above carry content -->
    <div class="loading-spinner" aria-label="Loading..."></div>
    <noscript>Please enable JavaScript to continue using Facebook.</noscript>
  </div>
</body>
</html>
